<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Snipoclip · Admin</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2343B0FF'/%3E%3Cstop offset='.5' stop-color='%237B5CFF'/%3E%3Cstop offset='1' stop-color='%23FF3DBE'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='120' height='120' rx='26' fill='url(%23g)'/%3E%3Cpath d='M60 30 C66 30 70 34 70 39 C80 33 94 30 104 36 C95 41 82 45 73 47 C75 60 71 74 62 90 C60 76 58 60 56 50 C46 46 34 41 24 35 C36 31 50 33 56 38 C56 33 55 30 60 30 Z' fill='%23fff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
 :root{--bg:#08080f;--panel:rgba(255,255,255,.045);--line:rgba(255,255,255,.1);--text:#f4f5fb;--muted:#9aa0b8;--muted2:#6a6f86}
 *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif}
 body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(42rem 42rem at 10% -5%,rgba(63,169,255,.14),transparent 60%),radial-gradient(40rem 40rem at 95% 8%,rgba(255,61,190,.12),transparent 60%)}
 .wrap{max-width:1100px;margin:0 auto;padding:24px}
 .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',Inter,sans-serif;font-weight:700;font-size:19px}
 .brand svg{width:30px;height:30px;display:block}
 .top{display:flex;align-items:center;gap:10px;margin-bottom:24px}
 .sp{flex:1}
 button.b{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:9px 14px;border-radius:10px;cursor:pointer;font:inherit}
 button.b:hover{background:rgba(255,255,255,.09)}
 .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
 .card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
 .card{padding:18px} .card .lab{color:var(--muted);font-size:13px} .card .val{font-size:32px;font-weight:700;margin-top:6px;font-family:'Space Grotesk',Inter,sans-serif}
 .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:18px}
 .panel{padding:18px} .panel h3{margin:0 0 2px;font-size:16px;font-family:'Space Grotesk',Inter,sans-serif} .panel .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
 .rep{border-top:1px solid var(--line);padding:12px 2px} .rep:first-child{border-top:0}
 .rep .who{font-size:12px;color:var(--muted2)} .rep .msg{font-size:14px;margin-top:3px;line-height:1.5}
 .login{position:fixed;inset:0;display:grid;place-items:center}
 .login .box{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px;width:330px;backdrop-filter:blur(14px)}
 .login input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:10px;padding:12px;color:#fff;margin-bottom:10px;font:inherit}
 .login .go{width:100%;background:linear-gradient(135deg,#43B0FF,#7B5CFF,#FF3DBE);color:#fff;border:0;border-radius:10px;padding:12px;font-weight:600;cursor:pointer}
 .err{color:#FF3DBE;font-size:13px;min-height:18px;margin-top:6px}
 .hide{display:none!important}
 canvas{max-height:240px}
 @media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style></head><body>

<div class="login" id="login">
 <div class="box">
   <div class="brand" style="margin-bottom:16px"><svg viewBox="0 0 120 120"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#43B0FF"/><stop offset=".5" stop-color="#7B5CFF"/><stop offset="1" stop-color="#FF3DBE"/></linearGradient></defs><rect x="6" y="6" width="108" height="108" rx="30" fill="url(#lg)"/><path d="M60 30 C66 30 70 34 70 39 C80 33 94 30 104 36 C95 41 82 45 73 47 C75 60 71 74 62 90 C60 76 58 60 56 50 C46 46 34 41 24 35 C36 31 50 33 56 38 C56 33 55 30 60 30 Z" fill="#fff"/></svg> Snipoclip Admin</div>
   <input id="email" type="email" placeholder="Admin email" autocomplete="username">
   <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
   <button class="go" id="signin">Sign in</button>
   <div class="err" id="loginErr"></div>
 </div>
</div>

<div id="app" class="wrap hide">
 <div class="top">
   <div class="brand"><svg viewBox="0 0 120 120"><defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#43B0FF"/><stop offset=".5" stop-color="#7B5CFF"/><stop offset="1" stop-color="#FF3DBE"/></linearGradient></defs><rect x="6" y="6" width="108" height="108" rx="30" fill="url(#bg2)"/><path d="M60 30 C66 30 70 34 70 39 C80 33 94 30 104 36 C95 41 82 45 73 47 C75 60 71 74 62 90 C60 76 58 60 56 50 C46 46 34 41 24 35 C36 31 50 33 56 38 C56 33 55 30 60 30 Z" fill="#fff"/></svg> Snipoclip Admin</div>
   <div class="sp"></div>
   <button class="b" id="refresh">↻ Refresh</button>
   <button class="b" id="logout">Logout</button>
 </div>
 <div class="cards" id="cards"></div>
 <div class="grid2">
   <div class="panel"><h3>Growth — last 14 days</h3><div class="sub">New signups &amp; clips generated</div><canvas id="cGrowth"></canvas></div>
   <div class="panel"><h3>Plan mix</h3><div class="sub">Free / Single / Half / Full</div><canvas id="cPlans"></canvas></div>
 </div>
 <div class="panel"><h3>Recent bug reports</h3><div class="sub" id="repSub">From the in-app help chat</div><div id="reports"></div></div>
</div>

<script>
const $=id=>document.getElementById(id);
let charts={};
$('signin').onclick=async()=>{
  $('loginErr').textContent='';
  try{
    const r=await fetch('/admin/login',{method:'POST',headers:{'content-type':'application/json'},credentials:'same-origin',body:JSON.stringify({email:$('email').value,password:$('pass').value})});
    if(!r.ok){const d=await r.json().catch(()=>({}));$('loginErr').textContent=d.error||'Login failed';return;}
    load();
  }catch{$('loginErr').textContent='Network error';}
};
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')$('signin').click();});
$('logout').onclick=async()=>{await fetch('/admin/logout',{method:'POST',credentials:'same-origin'});location.reload();};
$('refresh').onclick=load;
const esc=t=>String(t||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

async function load(){
  let r; try{ r=await fetch('/admin/api/stats',{credentials:'same-origin'}); }catch{ return; }
  if(r.status===401){$('login').classList.remove('hide');$('app').classList.add('hide');return;}
  const d=await r.json();
  $('login').classList.add('hide');$('app').classList.remove('hide');
  if(!d.configured){$('cards').innerHTML='<div class="card"><div class="lab">Supabase</div><div class="val">Not set</div></div>';return;}
  const cards=[['Total users',d.totals.users],['Clips generated',d.totals.clips],['Jobs run',d.totals.jobs],['Open bug reports',d.totals.openReports]];
  $('cards').innerHTML=cards.map(c=>`<div class="card"><div class="lab">${c[0]}</div><div class="val">${Number(c[1]).toLocaleString()}</div></div>`).join('');
  Object.values(charts).forEach(c=>c.destroy());charts={};
  const labels=d.days.map(x=>x.slice(5));
  charts.g=new Chart($('cGrowth'),{type:'line',data:{labels,datasets:[
    {label:'Signups',data:d.signups,borderColor:'#3FA9FF',backgroundColor:'rgba(63,169,255,.15)',tension:.35,fill:true,pointRadius:0},
    {label:'Clips',data:d.clipsSeries,borderColor:'#FF3DBE',backgroundColor:'rgba(255,61,190,.12)',tension:.35,fill:true,pointRadius:0}
  ]},options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9aa0b8'}}},scales:{x:{ticks:{color:'#6a6f86',maxRotation:0},grid:{color:'rgba(255,255,255,.05)'}},y:{beginAtZero:true,ticks:{color:'#6a6f86',precision:0},grid:{color:'rgba(255,255,255,.05)'}}}}});
  charts.p=new Chart($('cPlans'),{type:'doughnut',data:{labels:['Free','Single Slice','Half Pie','Full Pie'],datasets:[{data:[d.plans.free||0,d.plans.single||0,d.plans.half||0,d.plans.full||0],backgroundColor:['#6a6f86','#3FA9FF','#7B5CFF','#FF3DBE'],borderColor:'#0e0e16',borderWidth:3}]},options:{maintainAspectRatio:false,cutout:'62%',plugins:{legend:{labels:{color:'#9aa0b8'}}}}});
  const reps=d.reports||[];
  $('repSub').textContent=reps.length?(reps.length+' most recent'):'No bug reports yet 🎉';
  $('reports').innerHTML=reps.length?reps.map(x=>`<div class="rep"><div class="who">${esc(x.email||'user')} · ${new Date(x.created_at).toLocaleString()}${x.url?' · '+esc(x.url):''}</div><div class="msg">${esc(x.message)}</div></div>`).join(''):'<div class="rep" style="color:#6a6f86">Nothing reported yet.</div>';
}
load();
</script>
</body></html>
