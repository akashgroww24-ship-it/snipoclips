<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Sign in · Snipoclip</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2343B0FF'/%3E%3Cstop offset='.5' stop-color='%237B5CFF'/%3E%3Cstop offset='1' stop-color='%23FF3DBE'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='120' height='120' rx='26' fill='url(%23g)'/%3E%3Cpath d='M60 30 C66 30 70 34 70 39 C80 33 94 30 104 36 C95 41 82 45 73 47 C75 60 71 74 62 90 C60 76 58 60 56 50 C46 46 34 41 24 35 C36 31 50 33 56 38 C56 33 55 30 60 30 Z' fill='%23fff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0b1326;--panel:#171f33;--panel2:#222a3d;--line:rgba(255,255,255,.05);--line2:rgba(255,255,255,.10);--text:#dae2fd;--muted:#ccc3d8;--blue:#d2bbff;--violet-c:#7c3aed;--magenta:#ffb2b9;--green:#4edea3;--grad:linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%)}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;-webkit-font-smoothing:antialiased}
  .box{width:380px;max-width:92vw;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:34px}
  .logo{display:flex;align-items:center;gap:10px;justify-content:center;font-family:'Plus Jakarta Sans';font-weight:700;font-size:22px;margin-bottom:24px}
  .mark{width:28px;height:32px}
  .tabs{display:flex;background:var(--panel2);border-radius:12px;padding:4px;margin-bottom:20px}
  .tabs button{flex:1;background:none;border:0;color:var(--muted);font:inherit;font-weight:600;padding:10px;border-radius:9px;cursor:pointer}
  .tabs button.on{background:var(--grad);color:#fff}
  label{font-size:13px;color:var(--muted);font-weight:600;display:block;margin:14px 0 6px}
  input{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;color:var(--text);font:inherit}
  input:focus{outline:2px solid var(--blue);outline-offset:1px}
  .go{width:100%;margin-top:20px;background:var(--grad);color:#fff;border:0;border-radius:10px;padding:13px;font-weight:600;font-size:15px;cursor:pointer}
  .google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1f2430;border:0;border-radius:10px;padding:12px;font:inherit;font-weight:600;font-size:15px;cursor:pointer}
  .google:hover{background:#f1f3f7}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:18px 0 4px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line2)}
  .link{background:none;border:0;color:var(--muted);font:inherit;font-size:13px;cursor:pointer;margin-top:14px;text-decoration:underline;display:block;text-align:center;width:100%}
  .msg{font-size:13px;min-height:18px;margin-top:12px;text-align:center}
  .err{color:var(--magenta)}.ok{color:var(--green)}
  h2{font-family:'Plus Jakarta Sans';font-size:20px;margin:0 0 4px;text-align:center}
  .sub{color:var(--muted);font-size:13px;text-align:center;margin:0 0 18px}
</style>
</head>
<body>
<div class="box">
  <div style="display:flex;justify-content:flex-end;margin-bottom:-8px">
    <select id="lang" style="background:var(--panel2);color:var(--muted);border:1px solid var(--line2);border-radius:9px;padding:6px 9px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer"></select>
  </div>
  <div class="logo"><svg class="mark" viewBox="0 0 120 140"><defs><linearGradient id="sm" x1=".15" y1="0" x2=".85" y2="1"><stop offset="0" stop-color="#43B0FF"/><stop offset=".5" stop-color="#7c3aed"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect x="6" y="6" width="108" height="108" rx="30" fill="url(#sm)"/><path d="M60 30 C66 30 70 34 70 39 C80 33 94 30 104 36 C95 41 82 45 73 47 C75 60 71 74 62 90 C60 76 58 60 56 50 C46 46 34 41 24 35 C36 31 50 33 56 38 C56 33 55 30 60 30 Z" fill="#fff"/></svg>Snipoclip</div>

  <div class="tabs"><button id="tabIn" class="on" data-t="signin">Sign in</button><button id="tabUp" data-t="create">Create account</button></div>

  <button class="google" id="google">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.5l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.6l6.2 5.2C41.4 35.6 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
    <span data-t="google">Continue with Google</span>
  </button>
  <div class="divider"><span data-t="or">or use email</span></div>

  <div id="form">
    <label data-t="email">Email</label><input id="email" type="email" autocomplete="email" placeholder="you@example.com"/>
    <label data-t="pass">Password</label><input id="pass" type="password" autocomplete="current-password" placeholder="••••••••"/>
    <button class="go" id="submit" data-t="signin">Sign in</button>
    <button class="link" id="forgot" data-t="forgot">Forgot password?</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
let supa, mode='in';
const $=id=>document.getElementById(id);
const msg=(t,ok)=>{ const m=$('msg'); m.textContent=t; m.className='msg '+(ok?'ok':'err'); };

/* ---- lightweight i18n for the auth screen (login strings live here, not in app/i18n.js) ---- */
const LANGS=[['en','English'],['hi','हिन्दी'],['es','Español'],['pt','Português'],['fr','Français'],['ar','العربية']];
const RTL=['ar'];
const T={
  en:{signin:'Sign in',create:'Create account',google:'Continue with Google',or:'or use email',email:'Email',pass:'Password',forgot:'Forgot password?'},
  hi:{signin:'साइन इन करें',create:'खाता बनाएँ',google:'Google से जारी रखें',or:'या ईमेल का उपयोग करें',email:'ईमेल',pass:'पासवर्ड',forgot:'पासवर्ड भूल गए?'},
  es:{signin:'Iniciar sesión',create:'Crear cuenta',google:'Continuar con Google',or:'o usa tu correo',email:'Correo',pass:'Contraseña',forgot:'¿Olvidaste tu contraseña?'},
  pt:{signin:'Entrar',create:'Criar conta',google:'Continuar com Google',or:'ou use o e-mail',email:'E-mail',pass:'Senha',forgot:'Esqueceu a senha?'},
  fr:{signin:'Se connecter',create:'Créer un compte',google:'Continuer avec Google',or:'ou par e-mail',email:'E-mail',pass:'Mot de passe',forgot:'Mot de passe oublié ?'},
  ar:{signin:'تسجيل الدخول',create:'إنشاء حساب',google:'المتابعة مع Google',or:'أو استخدم البريد',email:'البريد الإلكتروني',pass:'كلمة المرور',forgot:'هل نسيت كلمة المرور؟'}
};
let lang = localStorage.getItem('sc_lang') || 'en';
if(!T[lang]) lang='en';
function applyLang(){
  const d=T[lang]||T.en;
  document.querySelectorAll('[data-t]').forEach(el=>{ const k=el.getAttribute('data-t'); if(d[k]) el.textContent=d[k]; });
  // keep the submit button in sync with the active mode
  $('submit').textContent = mode==='in' ? d.signin : d.create;
  document.documentElement.lang=lang;
  document.documentElement.dir = RTL.includes(lang) ? 'rtl' : 'ltr';
}
(function buildLangSelect(){
  const sel=$('lang');
  sel.innerHTML = LANGS.map(([c,n])=>`<option value="${c}"${c===lang?' selected':''}>${n}</option>`).join('');
  sel.onchange=()=>{ lang=sel.value; localStorage.setItem('sc_lang',lang); applyLang(); };
})();
applyLang();

try{ if(new URLSearchParams(location.search).get('timeout')==='1'){ msg('You were signed out due to inactivity. Please sign in again.', true); } }catch(e){}

async function init(){
  const cfg=await (await fetch('/api/public-config')).json();
  if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){ msg('Auth not configured yet (set Supabase keys in .env).'); return; }
  supa=window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  const { data:{ session } } = await supa.auth.getSession();
  if(session) location.href='/app';
}
init();

$('google').onclick=async()=>{
  if(!supa){ msg('Auth not configured yet'); return; }
  const { error }=await supa.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin + '/app' } });
  if(error) msg(error.message);
};

$('tabIn').onclick=()=>setMode('in');
$('tabUp').onclick=()=>setMode('up');
function setMode(m){ mode=m;
  $('tabIn').classList.toggle('on',m==='in'); $('tabUp').classList.toggle('on',m==='up');
  const d=T[lang]||T.en;
  $('submit').textContent = m==='in'? d.signin : d.create;
  $('pass').setAttribute('autocomplete', m==='in'?'current-password':'new-password');
  msg('');
}

// --- client-side brute-force limiter: 5 failed sign-ins -> 60s lockout ---
let _fails=0,_lockUntil=0,_ctTimer=null;
function _locked(){
  const left=Math.ceil((_lockUntil-Date.now())/1000);
  if(left>0){
    msg('Too many attempts. Try again in '+left+'s.');
    $('submit').disabled=true;
    clearTimeout(_ctTimer);
    _ctTimer=setTimeout(()=>{ if(Date.now()>=_lockUntil){$('submit').disabled=false;msg('');} else _locked(); },1000);
    return true;
  }
  $('submit').disabled=false; return false;
}
$('submit').onclick=async()=>{
  if(!supa) return;
  if(_locked()) return;
  const email=$('email').value.trim(), password=$('pass').value;
  if(!email||!password){ msg('Enter your email and password'); return; }
  msg('');
  try{
    if(mode==='in'){
      const { error }=await supa.auth.signInWithPassword({ email, password });
      if(error){ _fails++; if(_fails>=5){ _fails=0; _lockUntil=Date.now()+60000; _locked(); return; } return msg(error.message); }
      _fails=0; location.href='/app';
    }else{
      const { data, error }=await supa.auth.signUp({ email, password });
      if(error) return msg(error.message);
      if(data && data.session){ location.href='/app#upgrade'; return; }
      msg('Account created. Check your email to confirm, then sign in.', true);
      setMode('in');
    }
  }catch{ msg('Something went wrong. Try again.'); }
};

$('forgot').onclick=async()=>{
  if(!supa) return;
  const email=$('email').value.trim();
  if(!email){ msg('Enter your email first'); return; }
  const { error }=await supa.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/login' });
  msg(error? error.message : 'Password reset link sent — check your email.', !error);
};
</script>
</body>
</html>
